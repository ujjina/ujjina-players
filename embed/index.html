<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujjina Player</title>
<link href="https://vjs.zencdn.net/8.23.6/video-js.css" rel="stylesheet">
<style>
html,body{width:100%;height:100%;height:100dvh;margin:0;padding:0;overflow:hidden;background:#000;font-family:Inter,sans-serif}
#loading{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#fff;z-index:100}
#loading .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#ef4444;z-index:100;background:#000}
#error-screen.visible{display:flex}
#player{position:relative;width:100%;height:100%;display:none;background-size:cover;background-position:center;background-repeat:no-repeat}
#player .video-js{position:absolute;top:0;left:0;width:100%;height:100%;background-color:transparent!important}
#player .video-js .vjs-tech{background-color:transparent!important}
#player .video-js .vjs-poster{background-color:transparent!important}
#player .video-js .vjs-error-display{display:none!important}
#player .video-js.vjs-error .vjs-big-play-button{display:block!important}
.player-logo{position:absolute;z-index:30;pointer-events:none}
.vjs-offair .vjs-control-bar{display:none!important}
.vjs-offair .vjs-loading-spinner{display:none!important}
.vjs-offair .vjs-big-play-button{display:block!important}
.vjs-offair .equalizer{opacity:0.3!important}
.vjs-offair .equalizer .vertical{animation:eqIdle 2s ease infinite alternate-reverse!important}
#offair-bar{position:absolute;bottom:0;left:0;width:100%;z-index:48;display:none;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0) 100%);min-height:40px;box-sizing:border-box;pointer-events:none}
#offair-bar.visible{display:flex}
#offair-bar .offair-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.35);flex-shrink:0;animation:offair-pulse 2s ease-in-out infinite}
@keyframes offair-pulse{0%,100%{opacity:0.35}50%{opacity:0.8}}
#offair-bar .offair-label{color:rgba(255,255,255,0.7);font-family:Inter,sans-serif;font-size:clamp(10px,1.8vmin,13px);font-weight:600}
#offair-bar .offair-schedule{color:rgba(255,255,255,0.45);font-family:Inter,sans-serif;font-size:clamp(10px,1.6vmin,12px);margin-left:auto}
#offair-bar.fade-out{opacity:0;transition:opacity 0.6s ease-out}
.vjs-quality-btn{cursor:pointer;font-size:1.2em!important;font-weight:700;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;width:4em;height:100%;position:relative;padding:0}
.vjs-quality-menu{position:absolute;bottom:100%;right:0;background:rgba(20,20,28,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 0;min-width:100px;display:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);margin-bottom:6px}
.vjs-quality-menu.open{display:block}
.vjs-quality-item{display:block;width:100%;padding:6px 14px;color:#ccc;font-size:12px;font-family:Inter,sans-serif;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;white-space:nowrap}
.vjs-quality-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.vjs-quality-item.active{color:#8b6fff;font-weight:700}
@keyframes watermark-move{0%{top:10%;left:10%}25%{top:10%;left:70%}50%{top:70%;left:70%}75%{top:70%;left:10%}100%{top:10%;left:10%}}
.watermark-overlay{position:absolute;z-index:35;pointer-events:none;font-family:Inter,sans-serif;font-weight:700;font-size:clamp(12px,2vmin,18px);color:#fff;white-space:nowrap;animation:watermark-move 30s linear infinite}
.vjs-airplay-btn,.vjs-cast-btn,.vjs-audio-btn{cursor:pointer;display:flex;align-items:center;justify-content:center;width:4em;height:100%;padding:0;position:relative}
.vjs-airplay-btn svg,.vjs-cast-btn svg{width:1.8em;height:auto;fill:currentColor}
.vjs-audio-btn svg{width:1.6em;height:1.6em}
#password-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
#password-overlay.visible{display:flex}
#password-overlay .pw-box{display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px;max-width:320px;width:80%}
#password-overlay .pw-icon{width:48px;height:48px;opacity:0.7}
#password-overlay .pw-title{color:#fff;font-family:Inter,sans-serif;font-size:clamp(16px,3vmin,22px);font-weight:700;text-align:center;margin:0}
#password-overlay .pw-subtitle{color:rgba(255,255,255,0.6);font-family:Inter,sans-serif;font-size:clamp(12px,2vmin,14px);text-align:center;margin:0}
#password-overlay .pw-input{width:100%;padding:12px 16px;border:2px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:16px;font-family:Inter,sans-serif;outline:none;text-align:center;box-sizing:border-box}
#password-overlay .pw-input:focus{border-color:rgba(139,111,255,0.6)}
#password-overlay .pw-input.error{border-color:#ef4444;animation:pw-shake 0.4s ease}
#password-overlay .pw-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#8b6fff,#5ca0ff);color:#fff;font-size:15px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer;transition:opacity 0.2s}
#password-overlay .pw-btn:hover{opacity:0.9}
#password-overlay .pw-error-msg{color:#ef4444;font-family:Inter,sans-serif;font-size:13px;min-height:18px}
@keyframes pw-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes eq{from{height:100%}to{height:5px}}
@keyframes eqIdle{from{height:15px}to{height:5px}}
.equalizer{position:absolute;top:50%;left:0;width:100%;height:120px;transform:translateY(-50%);display:flex;justify-content:space-between;align-items:flex-end;padding:0 2rem;box-sizing:border-box;pointer-events:none;z-index:10;transition:opacity 0.5s ease}
.equalizer.active{opacity:1}
.equalizer.idle{opacity:0.3}
.equalizer .vertical{flex:1;margin:0 2px;border-radius:3px;height:10px}
#ad-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:55;display:none;background:#000}
#ad-overlay.visible{display:block}
#ad-overlay video{width:100%;height:100%;object-fit:contain;background:#000}
#ad-overlay .ad-label{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);color:#fff;font-family:Inter,sans-serif;font-size:12px;padding:4px 10px;border-radius:4px;pointer-events:none}
#ad-overlay .ad-skip{position:absolute;bottom:60px;right:10px;background:rgba(0,0,0,0.8);color:#fff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;transition:background 0.2s}
#ad-overlay .ad-skip:hover{background:rgba(255,255,255,0.15)}
#ad-overlay .ad-skip.disabled{opacity:0.5;cursor:default}
#ad-overlay .ad-click{position:absolute;top:0;left:0;width:100%;height:calc(100% - 80px);cursor:pointer}
</style>
<style id="dynamic-css"></style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Cargando reproductor...</span></div>
<div id="error-screen"><span id="error-msg">Error</span></div>

<div id="player">
    <video id="vjs-player" class="video-js vjs-big-play-centered" playsinline controls preload="auto"></video>
    <div id="offair-bar"><div class="offair-dot"></div><span class="offair-label" id="offair-label">Fuera de emisión</span><span class="offair-schedule" id="offair-schedule"></span></div>
    <div id="ad-overlay"><video id="ad-video" playsinline></video><div class="ad-label" id="ad-label">Anuncio</div><div class="ad-click" id="ad-click"></div><div class="ad-skip disabled" id="ad-skip">Omitir en...</div></div>
    <div id="password-overlay"><div class="pw-box">
        <svg class="pw-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <p class="pw-title">Contenido protegido</p>
        <p class="pw-subtitle">Ingresa la contraseña para ver este contenido</p>
        <input type="password" class="pw-input" id="pw-input" placeholder="Contraseña" autocomplete="off">
        <span class="pw-error-msg" id="pw-error"></span>
        <button class="pw-btn" id="pw-btn">Acceder</button>
    </div></div>
</div>

<!-- Video.js + Quality Levels -->
<script src="https://vjs.zencdn.net/8.23.6/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>

<script>
(function() {
    // Read uid & pid from URL
    var params = new URLSearchParams(window.location.search);
    var uid = params.get('uid');
    var pid = params.get('pid');

    if (!uid || !pid) {
        showError('Parámetros uid y pid requeridos');
        return;
    }

    // Load config from server-side API (never exposes password)
    fetch('https://panel.ujjina.com/api/player-config?uid=' + encodeURIComponent(uid) + '&pid=' + encodeURIComponent(pid))
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(config) {
            return resolveAndRender(config);
        })
        .catch(function(err) {
            console.error('Config error:', err);
            showError('Error al cargar configuración');
        });

    function detectMime(url) {
        if (!url) return 'application/x-mpegURL';
        var u = url.split('?')[0].toLowerCase();
        // No DASH (.mpd) — Video.js 8 needs videojs-contrib-dash plugin not loaded
        if (u.match(/\.mp4$/)) return 'video/mp4';
        if (u.match(/\.webm$/)) return 'video/webm';
        if (u.match(/\.mp3$/)) return 'audio/mpeg';
        return 'application/x-mpegURL';
    }

    async function resolveAndRender(config) {
        // Resolve stream URL
        var streamUrl = '';
        if (config.stream) {
            if (config.stream.method === 'direct') {
                streamUrl = config.stream.url || '';
            } else if (config.stream.jsonUrl && config.stream.jsonPath) {
                try {
                    var jCtrl = new AbortController();
                    var jTimeout = setTimeout(function() { jCtrl.abort(); }, 10000);
                    var resp = await fetch(config.stream.jsonUrl, { signal: jCtrl.signal });
                    clearTimeout(jTimeout);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    var data = await resp.json();
                    var parts = config.stream.jsonPath.split('.');
                    var DENY = ['__proto__', 'constructor', 'prototype'];
                    var value = data;
                    for (var i = 0; i < parts.length; i++) {
                        if (value == null || DENY.indexOf(parts[i]) !== -1) { value = null; break; }
                        value = value[parts[i]];
                    }
                    streamUrl = value || '';
                } catch (e) {
                    console.warn('Error resolving JSON stream:', e);
                }
            }
        }

        // Download VTT via proxy if subtitles configured
        var vttText = null;
        if (config.subtitles && config.subtitles.url) {
            try {
                var proxyUrl = 'https://panel.ujjina.com/api/proxy-vtt?url=' + encodeURIComponent(config.subtitles.url);
                var vttResp = await fetch(proxyUrl);
                if (vttResp.ok) {
                    vttText = await vttResp.text();
                }
            } catch (e) {
                console.warn('Could not download VTT:', e);
            }
        }

        // Render player via DOM manipulation (NO document.write)
        renderPlayer(config, streamUrl, vttText);
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-screen').classList.add('visible');
        document.getElementById('error-msg').textContent = msg;
    }

    function hexToRgba(hex, alpha) {
        if (!hex) return 'rgba(0,0,0,' + alpha + ')';
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        var r = parseInt(hex.substring(0, 2), 16) || 0;
        var g = parseInt(hex.substring(2, 4), 16) || 0;
        var b = parseInt(hex.substring(4, 6), 16) || 0;
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    // Language map (global for multi-audio + track fix)
    var _ln = {
        en:"English",es:"Español",fr:"Français",de:"Deutsch",it:"Italiano",pt:"Português",
        ja:"日本語",ko:"한국어",zh:"中文",ru:"Русский",ar:"العربية",hi:"हिन्दी",
        nl:"Nederlands",pl:"Polski",tr:"Türkçe",sv:"Svenska",el:"Ελληνικά",th:"ไทย",
        vi:"Tiếng Việt",id:"Indonesia",ms:"Melayu",uk:"Українська",cs:"Čeština",
        ro:"Română",hu:"Magyar",da:"Dansk",fi:"Suomi",nb:"Norsk",he:"עברית"
    };
    function resolveLang(code) {
        if (!code) return "";
        if (_ln[code]) return _ln[code];
        var base = code.split("-")[0];
        if (_ln[base]) return _ln[base];
        return code.toUpperCase();
    }

    function safeColor(val) {
        if (!val || typeof val !== 'string') return null;
        if (/^#[0-9a-fA-F]{3,8}$/.test(val)) return val;
        if (/^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(,\s*(0|1|0?\.\d+)\s*)?\)$/.test(val)) return val;
        return null;
    }

    function buildDynamicCss(config) {
        var css = '';
        var sel = '#player .video-js';
        var rc = config.colors || {};
        var c = { play: safeColor(rc.play), controls: safeColor(rc.controls), progress: safeColor(rc.progress), buffer: safeColor(rc.buffer), track: safeColor(rc.track), spinner: safeColor(rc.spinner), icons: safeColor(rc.icons), text: safeColor(rc.text) };
        // Big play button (always styled for shape, color only if custom)
        css += sel + ' .vjs-big-play-button{font-size:clamp(4em,10vmin,8em)!important;width:1.5em!important;height:1.5em!important;line-height:1.5em!important;border-radius:50%!important;border:0.06em solid rgba(255,255,255,0.25)!important;padding:0!important;top:50%!important;left:50%!important;margin-top:-0.75em!important;margin-left:-0.75em!important;transition:background-color 0.3s ease,transform 0.2s ease!important}';
        if (c.play) {
            var playRgba = hexToRgba(c.play, 0.85);
            var playRgbaHover = hexToRgba(c.play, 1);
            css += sel + ' .vjs-big-play-button{background-color:' + playRgba + '!important}';
            css += sel + ' .vjs-big-play-button:hover{background-color:' + playRgbaHover + '!important}';
        }
        css += sel + ' .vjs-big-play-button:hover{transform:scale(1.1)!important}';
        css += sel + ' .vjs-big-play-button .vjs-icon-placeholder::before{display:flex!important;align-items:center!important;justify-content:center!important}';

        // Control bar colors (only override if custom color is set)
        if (c.controls) css += sel + ' .vjs-control-bar{background-color:' + c.controls + '!important}';
        if (c.progress) css += sel + ' .vjs-play-progress,' + sel + ' .vjs-volume-level{background-color:' + c.progress + '!important}';
        if (c.buffer) {
            css += sel + ' .vjs-load-progress{background-color:' + c.buffer + '!important}';
            css += sel + ' .vjs-load-progress div{background:none!important}';
        }
        if (c.track) css += sel + ' .vjs-progress-holder{background-color:' + c.track + '!important}';
        if (c.spinner) {
            var spinColor = c.spinner;
            var spinRgba = hexToRgba(spinColor, 0.2);
            css += sel + ' .vjs-loading-spinner{border-color:' + spinRgba + '!important;border-top-color:' + spinColor + '!important}';
        }
        if (c.icons) css += sel + ' .vjs-control-bar .vjs-control{color:' + c.icons + '!important}';
        if (c.text) css += sel + ' .vjs-time-control,' + sel + ' .vjs-live-display{color:' + c.text + '!important}';

        if (config.type === 'radio') {
            css += sel + '{background-color:transparent!important}';
            css += sel + ' .vjs-poster{background-color:transparent!important}';
            css += sel + '.vjs-has-started .vjs-tech{background-color:transparent!important}';
            css += sel + ' .vjs-tech{background-color:transparent!important}';
        } else {
            css += sel + '.vjs-has-started .vjs-tech{background-color:#000!important}';
        }

        // Large control bar
        var barSize = (config.behavior && config.behavior.controlbarSize) || 'default';
        if (barSize === 'large') {
            css += sel + '{font-size:15px!important}';
        }

        // EPG bar CSS (dynamic because position depends on config)
        if (config.epg && config.epg.enabled && config.epg.schedule && config.epg.schedule.length) {
            var epgPos = config.epg.position || 'top';
            css += '.epg-bar{position:absolute;' + (epgPos === 'top' ? 'top:0' : 'bottom:3em') + ';left:0;width:100%;z-index:25;display:flex;align-items:center;padding:8px 16px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-family:Inter,sans-serif;color:#fff;gap:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;box-sizing:border-box}';
            css += '.vjs-user-active .epg-bar,.vjs-paused .epg-bar{opacity:1}';
            css += '.epg-label{text-transform:uppercase;font-size:clamp(8px,1.4vmin,10px);letter-spacing:1px;opacity:0.5;flex-shrink:0}';
            css += '.epg-now{font-weight:700;font-size:clamp(11px,2vmin,14px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}';
            css += '.epg-sep{opacity:0.3;flex-shrink:0}';
            css += '.epg-next{font-weight:400;font-size:clamp(10px,1.8vmin,13px);opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}';
        }

        return css;
    }

    function renderPlayer(config, streamUrl, vttText) {
        // Safe play helper — handles autoplay rejection by muting and retrying
        function safePlay() { var p = player.play(); if (p && p.catch) p.catch(function() { player.muted(true); player.play(); }); }

        // Hide loading, show player container
        document.getElementById('loading').style.display = 'none';
        document.getElementById('player').style.display = 'block';

        // Inject dynamic CSS
        document.getElementById('dynamic-css').textContent = buildDynamicCss(config);

        // Set poster (TV only)
        var videoEl = document.getElementById('vjs-player');
        if (config.type === 'tv' && config.poster && config.poster.image) {
            videoEl.setAttribute('poster', config.poster.image);
        }

        // Off-air bar config (subtle bar at bottom — poster + big play button stay visible)
        var offairBar = document.getElementById('offair-bar');
        var offairScheduleEl = document.getElementById('offair-schedule');

        // Password overlay — hide if not needed
        var pwOverlay = document.getElementById('password-overlay');
        if (!(config.protection && config.protection.enabled)) {
            pwOverlay.style.display = 'none';
        } else {
            pwOverlay.classList.add('visible');
        }

        // Disable autoplay when ads or password protection are active
        var wantsAutoplay = config.behavior ? !!config.behavior.autoplay : false;
        var hasAds = !!(config.ads && config.ads.enabled && config.ads.vastUrl);
        var hasProtection = !!(config.protection && config.protection.enabled);

        // Initialize Video.js player
        var player = videojs('vjs-player', {
            controls: config.behavior ? config.behavior.controls !== false : true,
            autoplay: (hasAds || hasProtection) ? false : wantsAutoplay,
            liveui: config.behavior ? config.behavior.liveui !== false : true,
            fluid: false,
            sources: streamUrl ? [{ src: streamUrl, type: detectMime(streamUrl) }] : []
        });
        // Hide control bar until stream actually plays (prevents flash of HD/controls)
        player.el().classList.add('vjs-offair');

        // ─── Track label fix (audio + subtitles from HLS manifests) ───
        (function() {
            var _ut;
            function schedUpd() {
                clearTimeout(_ut);
                _ut = setTimeout(function() {
                    var at = player.audioTracks(), ac = {}, i, lb;
                    for (i = 0; i < at.length; i++) { lb = at[i].label; if (!ac[lb]) ac[lb] = []; ac[lb].push(i); }
                    for (lb in ac) { if (ac[lb].length > 1) for (i = 0; i < ac[lb].length; i++) at[ac[lb][i]].label = lb + ' ' + (i + 1); }
                    var tt = player.textTracks(), tc = {};
                    for (i = 0; i < tt.length; i++) { if (tt[i].kind === 'metadata') continue; lb = tt[i].label; if (!tc[lb]) tc[lb] = []; tc[lb].push(i); }
                    for (lb in tc) { if (tc[lb].length > 1) for (i = 0; i < tc[lb].length; i++) tt[tc[lb][i]].label = lb + ' ' + (i + 1); }
                    var cb = player.controlBar; if (!cb) return;
                    var ab = cb.getChild('audioTrackButton'); if (ab) ab.update();
                    var sb = cb.getChild('subsCapsButton'); if (sb) sb.update();
                }, 600);
            }
            function fix(t) {
                var l = t.label || '';
                if (!l || /^(stream|track|audio|subtitle|text)[_\s-]?\d*$/i.test(l)) {
                    var n = resolveLang(t.language);
                    if (n) { t.label = n; schedUpd(); }
                }
            }
            function fixAll(list) {
                for (var i = 0; i < list.length; i++) fix(list[i]);
                list.addEventListener('addtrack', function(e) { if (e.track) fix(e.track); });
            }
            player.ready(function() { fixAll(player.audioTracks()); fixAll(player.textTracks()); });
        })();

        // ─── Password protection (server-side verification) ───
        if (config.protection && config.protection.enabled) {
            var pwInput = document.getElementById('pw-input');
            var pwBtn = document.getElementById('pw-btn');
            var pwError = document.getElementById('pw-error');
            var pwChecking = false;
            player.el().style.visibility = 'hidden';
            function unlock() {
                if (pwChecking) return;
                pwChecking = true;
                pwBtn.textContent = '...';
                fetch('https://panel.ujjina.com/api/verify-password', {
                    method: 'POST',

                    var timeRange = cur.time + (cur.endTime ? ' - ' + cur.endTime : '');
                    if (nowEl) nowEl.textContent = timeRange + '  ' + cur.title;
                    if (nxtEl) nxtEl.textContent = nxt ? nxt.title + ' (' + nxt.time + (nxt.endTime ? ' - ' + nxt.endTime : '') + ')' : '';
                    var sep = bar.querySelector('.epg-sep'), labels = bar.querySelectorAll('.epg-label');
                    if (!nxt) { if (sep) sep.style.display = 'none'; if (labels[1]) labels[1].style.display = 'none'; if (nxtEl) nxtEl.style.display = 'none'; }
                    else { if (sep) sep.style.display = ''; if (labels[1]) labels[1].style.display = ''; if (nxtEl) nxtEl.style.display = ''; }
                }
                upd();
                var epgTimer = setInterval(upd, 60000);
                player.on('dispose', function() { clearInterval(epgTimer); });
            })();
        }

        // ─── Ad insertion (pre-roll + mid-roll via VAST proxy) ───
        if (config.ads && config.ads.enabled && config.ads.vastUrl) {
            (function() {
                var PROXY = 'https://panel.ujjina.com/api/proxy-vast?url=';
                var vastUrl = config.ads.vastUrl;
                var midroll = !!config.ads.midroll;
                var midrollTime = (Math.max(1, config.ads.midrollTime || 15)) * 60;
                var adOverlay = document.getElementById('ad-overlay');
                var adVideo = document.getElementById('ad-video');
                var adLabel = document.getElementById('ad-label');
                var adSkip = document.getElementById('ad-skip');
                var adClick = document.getElementById('ad-click');
                var midrollFired = false;
                var adPlaying = false;
                var prerollData = null;
                var prerollReady = false;

                function parseVAST(xml) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(xml, 'application/xml');
                    var result = { mediaUrl: null, skipOffset: 0, clickUrl: null };
                    var clickEl = doc.querySelector('ClickThrough');
                    if (clickEl) result.clickUrl = (clickEl.textContent || '').trim();
                    var linear = doc.querySelector('Linear');
                    if (linear) {
                        var skip = linear.getAttribute('skipoffset');
                        if (skip) {
                            var parts = skip.split(':');
                            if (parts.length === 3) result.skipOffset = (parseInt(parts[0]) || 0) * 3600 + (parseInt(parts[1]) || 0) * 60 + (parseInt(parts[2]) || 0);
                            else if (parts.length === 2) result.skipOffset = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
                            else result.skipOffset = parseInt(skip) || 0;
                        }
                    }
                    var mediaFiles = doc.querySelectorAll('MediaFile');
                    for (var i = 0; i < mediaFiles.length; i++) {
                        var type = (mediaFiles[i].getAttribute('type') || '').toLowerCase();
                        var url = (mediaFiles[i].textContent || '').trim();
                        if (url && (type.indexOf('mp4') !== -1 || type.indexOf('video') !== -1)) {
                            result.mediaUrl = url;
                            break;
                        }
                    }
                    if (!result.mediaUrl && mediaFiles.length > 0) {
                        result.mediaUrl = (mediaFiles[0].textContent || '').trim();
                    }
                    return result;
                }

                function showAd(data, onDone) {
                    if (!data || !data.mediaUrl) { onDone(); return; }
                    adPlaying = true;
                    player.pause();
                    player.controls(false);
                    adOverlay.classList.add('visible');

                    var skipTime = data.skipOffset || 0;
                    var skipReady = skipTime <= 0;
                    adSkip.className = 'ad-skip' + (skipReady ? '' : ' disabled');
                    adSkip.textContent = skipReady ? 'Omitir anuncio \u25B6' : 'Omitir en ' + skipTime + 's';

                    var clickUrl = data.clickUrl;
                    adClick.onclick = function() {
                        if (clickUrl && /^https?:\/\//i.test(clickUrl)) window.open(clickUrl, '_blank');
                    };

                    var skipInterval = null;
                    if (!skipReady) {
                        var remaining = skipTime;
                        skipInterval = setInterval(function() {
                            remaining--;
                            if (remaining <= 0) {
                                clearInterval(skipInterval);
                                skipReady = true;
                                adSkip.className = 'ad-skip';
                                adSkip.textContent = 'Omitir anuncio \u25B6';
                            } else {
                                adSkip.textContent = 'Omitir en ' + remaining + 's';
                            }
                        }, 1000);
                    }

                    adSkip.onclick = function() {
                        if (!skipReady) return;
                        endAd();
                    };

                    var adEnded = false;
                    function endAd() {
                        if (adEnded) return; // guard against double-call (skip + onended)
                        adEnded = true;
                        if (skipInterval) clearInterval(skipInterval);
                        adPlaying = false;
                        adOverlay.classList.remove('visible');
                        adVideo.pause();
                        adVideo.removeAttribute('src');
                        adVideo.load();
                        player.controls(config.behavior ? config.behavior.controls !== false : true);
                        onDone();
                    }

                    adVideo.onended = endAd;
                    adVideo.onerror = function() { endAd(); };

                    // Play ad — called synchronously from user gesture chain
                    adVideo.play().catch(function() {
                        adVideo.muted = true;
                        adVideo.play().catch(function() { endAd(); });
                    });
                }

                // ── PRE-ROLL: fetch VAST + preload video IMMEDIATELY ──
                // This runs as soon as renderPlayer executes (before user clicks play)
                fetch(PROXY + encodeURIComponent(vastUrl))
                    .then(function(r) { return r.text(); })
                    .then(function(xml) {
                        var data = parseVAST(xml);
                        if (data && data.mediaUrl) {
                            prerollData = data;
                            // Preload the ad video so it's ready when user clicks play
                            adVideo.src = data.mediaUrl;
                            adVideo.preload = 'auto';
                            adVideo.load();
                            adVideo.addEventListener('canplay', function() {
                                prerollReady = true;
                            }, { once: true });
                            // Also set ready after 5s even if canplay hasn't fired
                            setTimeout(function() { prerollReady = true; }, 5000);
                        }
                    })
                    .catch(function(e) { console.warn('VAST prefetch error:', e); });

                // ── Intercept play or handle autoplay ──
                var prerollDone = false;

                function startPreroll(fromUserGesture) {
                    if (prerollDone) return;
                    prerollDone = true;
                    player.pause();
                    if (prerollData && prerollReady) {
                        showAd(prerollData, function() { safePlay(); });
                    } else if (prerollData) {
                        adLabel.textContent = 'Cargando anuncio...';
                        adOverlay.classList.add('visible');
                        var waitTimer = setInterval(function() {
                            if (prerollReady) {
                                clearInterval(waitTimer);
                                adOverlay.classList.remove('visible');
                                adLabel.textContent = 'Anuncio';
                                showAd(prerollData, function() { safePlay(); });
                            }
                        }, 200);
                        setTimeout(function() {
                            if (!prerollReady) {
                                clearInterval(waitTimer);
                                adOverlay.classList.remove('visible');
                                adLabel.textContent = 'Anuncio';
                                player.controls(config.behavior ? config.behavior.controls !== false : true);
                                safePlay();
                            }
                        }, 8000);
                    } else {
                        // VAST not loaded yet — wait for it
                        adLabel.textContent = 'Cargando anuncio...';
                        adOverlay.classList.add('visible');
                        var pollTimer = setInterval(function() {
                            if (prerollData && prerollReady) {
                                clearInterval(pollTimer);
                                adOverlay.classList.remove('visible');
                                adLabel.textContent = 'Anuncio';
                                showAd(prerollData, function() { safePlay(); });
                            }
                        }, 300);
                        setTimeout(function() {
                            clearInterval(pollTimer);
                            adOverlay.classList.remove('visible');
                            adLabel.textContent = 'Anuncio';
                            player.controls(config.behavior ? config.behavior.controls !== false : true);
                            safePlay();
                        }, 10000);
                    }
                }

                // If user had autoplay (and no password protection), start preroll automatically once VAST loads
                if (wantsAutoplay && !hasProtection) {
                    // Wait for VAST to load, then start preroll (muted since no gesture)
                    var autoplayCheck = setInterval(function() {
                        if (prerollData) {
                            clearInterval(autoplayCheck);
                            adVideo.muted = true;
                            startPreroll(false);
                        }
                    }, 300);
                    // Timeout: if VAST doesn't load in 10s, just autoplay content
                    setTimeout(function() {
                        if (!prerollDone) {
                            clearInterval(autoplayCheck);
                            prerollDone = true;
                            player.muted(true);
                            player.play();
                        }
                    }, 10000);
                }

                // Manual play: intercept first play event (use .on + prerollDone flag, not .one,
                // because .one is consumed if first play triggers off-air → ads never show)
                player.on('play', function() {
                    if (prerollDone) return;
                    startPreroll(true);
                });

                // ── MID-ROLL: fetch + play after X minutes of watch time (recurring for 24/7) ──
                if (midroll && midrollTime > 0) {
                    var watchedTime = 0, watchStart = 0;
                    // Reset watch time on off-air (prevents premature mid-roll after recovery)
                    player.on('emptied', function() { watchedTime = 0; watchStart = 0; midrollFired = false; });
                    player.on('play', function() { if (!watchStart) watchStart = performance.now(); });
                    player.on('pause', function() { if (watchStart) { watchedTime += (performance.now() - watchStart) / 1000; watchStart = 0; } });
                    document.addEventListener('visibilitychange', function() {
                        if (document.hidden && watchStart) { watchedTime += (performance.now() - watchStart) / 1000; watchStart = 0; }
                        else if (!document.hidden && !player.paused()) { watchStart = performance.now(); }
                    });
                    player.on('timeupdate', function() {
                        if (midrollFired || adPlaying || !prerollDone) return;
                        var total = watchedTime + (watchStart ? (performance.now() - watchStart) / 1000 : 0);
                        if (total >= midrollTime) {
                            midrollFired = true;
                            // User already interacted — no need to mute
                            fetch(PROXY + encodeURIComponent(vastUrl))
                                .then(function(r) { return r.text(); })
                                .then(function(xml) {
                                    var data = parseVAST(xml);
                                    if (data && data.mediaUrl) {
                                        adVideo.src = data.mediaUrl;
                                        adVideo.load();
                                        var midrollShown = false;
                                        adVideo.addEventListener('canplay', function() {
                                            if (midrollShown) return;
                                            midrollShown = true;
                                            showAd(data, function() {
                                                // Reset for next mid-roll (recurring for 24/7 streams)
                                                watchedTime = 0; watchStart = performance.now(); midrollFired = false;
                                                safePlay();
                                            });
                                        }, { once: true });
                                        setTimeout(function() {
                                            if (!midrollShown) {
                                                midrollShown = true;
                                                // Ad failed to load — clean up and reset for next cycle
                                                adVideo.removeAttribute('src'); adVideo.load();
                                                watchedTime = 0; watchStart = performance.now(); midrollFired = false;
                                            }
                                        }, 8000);
                                    } else {
                                        // No valid VAST — reset for next cycle
                                        watchedTime = 0; watchStart = performance.now(); midrollFired = false;
                                    }
                                })
                                .catch(function() {
                                    // Fetch failed — reset for next cycle
                                    watchedTime = 0; watchStart = performance.now(); midrollFired = false;
                                });
                        }
                    });
                }
            })();
        }

        // ─── Analytics tracking (solo producción, no preview) ───
        (function() {
            var ANALYTICS_URL = 'https://panel.ujjina.com/api/analytics';
            if (!uid || !pid) return;
            var sid = Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
            var dur = 0, bufCount = 0, bufMs = 0, errCount = 0, ttff = 0, quality = '', ref = '';
            var bufStart = 0, playStart = 0;
            try { ref = document.referrer || (window.parent !== window ? 'iframe' : 'direct'); } catch (e) { ref = 'iframe'; }
            var loadStart = Date.now();
            player.one('playing', function() { ttff = Date.now() - loadStart; });
            player.on('waiting', function() { if (!bufStart) bufStart = Date.now(); });
            player.on('playing', function() { if (bufStart) { bufMs += Date.now() - bufStart; bufCount++; bufStart = 0; } });
            player.on('error', function() { errCount++; if (playStart) { dur += (Date.now() - playStart) / 1000; playStart = 0; } });
            if (player.qualityLevels) {
                var ql = player.qualityLevels();
                ql.on('change', function() { var active = ql[ql.selectedIndex]; if (active && active.height) quality = active.height + 'p'; });
            }
            function send(type, extra) {
                var data = { uid: uid, pid: pid, sid: sid, t: type, d: Math.round(dur), buf: bufCount, bufMs: Math.round(bufMs), err: errCount, ttff: Math.round(ttff), q: quality, ref: ref };
                if (extra) for (var k in extra) data[k] = extra[k];
                try { navigator.sendBeacon(ANALYTICS_URL, JSON.stringify(data)); } catch (e) {
                    try { fetch(ANALYTICS_URL, { method: 'POST', body: JSON.stringify(data), keepalive: true, headers: { 'Content-Type': 'application/json' } }); } catch (e2) {}
                }
            }
            send('start');
            player.on('play', function() { playStart = Date.now(); });
            player.on('pause', function() { if (playStart) { dur += (Date.now() - playStart) / 1000; playStart = 0; } });
            var lastSentDur = 0;
            var heartbeatTimer = setInterval(function() {
                if (playStart) { dur += (Date.now() - playStart) / 1000; playStart = Date.now(); }
                var deltaDur = dur - lastSentDur;
                if (deltaDur < 1 && bufCount === 0 && errCount === 0) return;
                lastSentDur = dur;
                send('heartbeat', { d: Math.round(deltaDur) });
                bufCount = 0; bufMs = 0; errCount = 0;
            }, 300000);
            player.on('dispose', function() { clearInterval(heartbeatTimer); });
            window.addEventListener('beforeunload', function() {
                clearInterval(heartbeatTimer);
                if (playStart) { dur += (Date.now() - playStart) / 1000; }
                send('end', { d: Math.round(dur - lastSentDur) });
            });
        })();
    }
})();
</script>
